# Run pytest (no real secrets) on every push/PR to main — full suite with placeholder Supabase.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # Use Node 24 for JS-based actions (checkout/setup-python) before runner removes Node 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run full pytest suite
        env:
          # Placeholder Supabase — real client init is mocked in tests that need it (see test_referral_code_check).
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: ci-placeholder-key
        run: |
          python -m pytest . --ignore=scripts -v --tb=short
