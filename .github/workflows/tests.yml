# Run pytest (no real secrets) on every push/PR to main — full suite with placeholder Supabase.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        id: setup-py
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          "${{ steps.setup-py.outputs.python-path }}" -m pip install --upgrade pip
          "${{ steps.setup-py.outputs.python-path }}" -m pip install -r requirements.txt pytest

      - name: Run full pytest suite
        env:
          # Placeholder Supabase — real client init is mocked in tests that need it (see test_referral_code_check).
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: ci-placeholder-key
        run: |
          "${{ steps.setup-py.outputs.python-path }}" -m pytest . --ignore=scripts -v --tb=short
