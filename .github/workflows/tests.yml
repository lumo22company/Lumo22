# Run pytest (no real secrets) on every push/PR to main — full suite with placeholder Supabase.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        id: setup-py
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          "${{ steps.setup-py.outputs.python-path }}" -m pip install --upgrade pip
          "${{ steps.setup-py.outputs.python-path }}" -m pip install -r requirements.txt pytest

      - name: Run full pytest suite
        env:
          DISABLE_CSRF: "1"
          # Placeholder Supabase — real client init is mocked in tests that need it (see test_referral_code_check).
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: ci-placeholder-key
          # Stripe / OpenAI placeholders so checkout routes and CaptionGenerator init succeed; Session.create is mocked in tests.
          STRIPE_SECRET_KEY: sk_test_ci_placeholder_not_for_live_stripe_00000000000000
          STRIPE_CAPTIONS_PRICE_ID: price_ci_placeholder_gbp
          STRIPE_CAPTIONS_SUBSCRIPTION_PRICE_ID: price_ci_placeholder_subscription_gbp
          # Story / caption prompt tests construct CaptionGenerator (no real API calls when chat_completion is patched).
          OPENAI_API_KEY: sk-ci-openai-placeholder-not-used-in-unit-tests
        run: |
          "${{ steps.setup-py.outputs.python-path }}" -m pytest . --ignore=scripts -v --tb=short

  # Roadmap: dependency CVEs on same Python as production (see SECURITY_PRIVACY_REVIEW.md).
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        id: setup-py
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: |
          "${{ steps.setup-py.outputs.python-path }}" -m pip install --upgrade pip
          "${{ steps.setup-py.outputs.python-path }}" -m pip install pip-audit

      - name: Audit requirements.txt
        run: |
          "${{ steps.setup-py.outputs.python-path }}" -m pip_audit -r requirements.txt
