{# Google Translate widget. Auto-detects browser language on first visit (no prior choice). #}
<div class="footer-translate-wrap">
  <span class="footer-translate-label">Language</span>
  <div id="google_translate_element" class="footer-translate-element"></div>
</div>
<script>
(function() {
  var LANG_MAP = { fr: 'fr', es: 'es', de: 'de', pt: 'pt', it: 'it', nl: 'nl', pl: 'pl', ar: 'ar', tr: 'tr', sv: 'sv', ja: 'ja', zh: 'zh-CN', hi: 'hi', bn: 'bn' };
  var hasGoogTrans = /googtrans=/.test(document.cookie);
  if (!hasGoogTrans) {
    var navLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    var code = navLang.split('-')[0];
    if (code && code !== 'en' && LANG_MAP[code]) {
      document.cookie = 'googtrans=/en/' + LANG_MAP[code] + '; path=/; max-age=31536000';
      window.location.reload();
      return;
    }
  }
  function init() {
    if (typeof google === 'undefined' || !google.translate) return;
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,es,fr,de,pt,it,nl,pl,ar,tr,sv,ja,zh-CN,hi,bn',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    }, 'google_translate_element');
  }
  if (typeof google !== 'undefined' && google.translate) {
    init();
  } else {
    window.googleTranslateElementInit = init;
    var s = document.createElement('script');
    s.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
    s.async = true;
    document.head.appendChild(s);
  }
})();
</script>
