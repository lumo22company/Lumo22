<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Lumo 22</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}?v={{ asset_version }}">
  <style>
    .auth-page { padding: 6rem 1.5rem 4rem; max-width: 420px; margin: 0 auto; }
    .auth-page h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 0.5rem; letter-spacing: 0.02em; }
    .auth-page .sub { color: var(--lum-text-muted); margin-bottom: 2rem; }
    .auth-page label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; }
    .auth-page input { width: 100%; padding: 0.75rem 1rem; background: #ffffff; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: #1a1a1a; margin-bottom: 1.25rem; }
    .auth-page input::placeholder { color: #666; }
    .auth-page .btn { display: inline-block; padding: 1rem 2rem; background: transparent; color: var(--lum-gold); font-weight: 600; border: 2px solid var(--lum-gold); border-radius: 8px; cursor: pointer; width: 100%; position: relative; overflow: hidden; transition: color 0.25s ease, border-color 0.25s ease; }
    .auth-page .btn::before { content: ''; position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: var(--lum-gold); transform: scaleX(0); transform-origin: left center; transition: transform 0.35s ease-out; z-index: -1; }
    .auth-page .btn:hover:not(:disabled) { color: #000; border-color: var(--lum-gold); }
    .auth-page .btn:hover:not(:disabled)::before { transform: scaleX(1); }
    .auth-page .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-page .msg { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; font-size: 0.95rem; }
    .auth-page .msg.error { background: rgba(200,80,80,0.15); color: var(--lum-text); }
    .auth-page .msg.success { background: rgba(76,175,80,0.15); color: var(--lum-text); }
    .auth-page .link { margin-top: 1.5rem; text-align: center; }
    .auth-page .link a { color: var(--lum-gold); text-decoration: none; }
    .auth-page .link a:hover { text-decoration: underline; }
    .auth-page .marketing-optin-row { display:flex; align-items:flex-start; gap:0.5rem; font-size:0.9rem; cursor:pointer; margin:0 0 1.25rem; line-height:1.45; padding-left:0; width:100%; }
    .auth-page .marketing-optin-row input[type="checkbox"] { width:auto; margin:0.2rem 0 0 0; padding:0; flex-shrink:0; }
    .pw-toggle { margin: -0.75rem 0 1rem; text-align: right; }
    .pw-toggle button { background: none; border: 0; color: var(--lum-gold); cursor: pointer; font-size: 0.82rem; padding: 0; }
  </style>
</head>
<body class="lumo-landing">
  <nav class="lumo-nav lumo-nav-scrolled">
    <div class="lumo-nav-left">
      <a href="/" class="lumo-nav-logo">Lumo 22</a>
      <a href="/captions" class="lumo-nav-link">Captions</a>
    </div>
    <a href="/login" class="lumo-nav-cta lumo-nav-login">Log in</a>
  </nav>

  <main class="auth-page">
    <h1>Create your account</h1>
    <p class="sub">One account for your Captions.</p>

    <form id="signup-form">
      <input type="hidden" id="referral_code" name="referral_code" value="">
      <input type="hidden" id="next_url" value="{{ next_url|default('', true)|e }}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" value="{{ prefilled_email|default('', true)|e }}">
      <label for="email_confirm">Confirm email</label>
      <input type="email" id="email_confirm" name="email_confirm" required autocomplete="email" placeholder="Re-enter your email" value="{{ prefilled_email|default('', true)|e }}">

      <label for="password">Password <span style="font-weight:400;color:var(--lum-text-muted);">(min 12 characters, include 1 number)</span></label>
      <input type="password" id="password" name="password" required minlength="12" autocomplete="new-password" placeholder="At least 12 characters, 1 number">
      <div class="pw-toggle"><button type="button" id="toggle-password">Show password</button></div>

      <label for="password_confirm">Confirm password</label>
      <input type="password" id="password_confirm" name="password_confirm" required minlength="12" autocomplete="new-password">

      <label class="marketing-optin-row">
        <input type="checkbox" id="marketing_opt_in" name="marketing_opt_in" value="1">
        <span>Email me tips, updates and offers from Lumo 22 (optional). You can change this anytime in your account.</span>
      </label>

      <button type="submit" class="btn" id="btn">Create account</button>
      <div id="msg" class="msg" style="display: none;"></div>
      <div id="msg-continue" class="msg success" style="display: none; margin-top: 1rem;"></div>
    </form>

    <p class="link">Already have an account? <a href="/login{% if next_url %}?next={{ next_url|urlencode }}{% if prefilled_email %}&amp;email={{ prefilled_email|urlencode }}{% endif %}{% elif prefilled_email %}?email={{ prefilled_email|urlencode }}{% endif %}">Log in</a></p>
    <p class="link"><a href="/captions" id="back-link">← Back</a></p>
  </main>

  <script>
    (function() {
      var ref = (new URLSearchParams(window.location.search).get('ref') || '').trim();
      if (ref) document.getElementById('referral_code').value = ref;
      var backLink = document.getElementById('back-link');
      if (backLink) {
        backLink.addEventListener('click', function(e) {
          if (window.history.length > 1) {
            e.preventDefault();
            window.history.back();
          }
        });
      }

      var form = document.getElementById('signup-form');
      var btn = document.getElementById('btn');
      var msg = document.getElementById('msg');
      var pwInput = document.getElementById('password');
      var pwToggle = document.getElementById('toggle-password');
      if (pwToggle && pwInput) {
        pwToggle.addEventListener('click', function() {
          var showing = pwInput.type === 'text';
          pwInput.type = showing ? 'password' : 'text';
          pwToggle.textContent = showing ? 'Show password' : 'Hide password';
        });
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var pw = document.getElementById('password').value;
        var pw2 = document.getElementById('password_confirm').value;
        var email = document.getElementById('email').value.trim().toLowerCase();
        var email2 = document.getElementById('email_confirm').value.trim().toLowerCase();
        if (!email || email.indexOf('@') === -1) {
          msg.className = 'msg error';
          msg.textContent = 'Please enter a valid email.';
          msg.style.display = 'block';
          return;
        }
        if (email !== email2) {
          msg.className = 'msg error';
          msg.textContent = 'Those email addresses don\'t match.';
          msg.style.display = 'block';
          return;
        }
        if (pw !== pw2) {
          msg.className = 'msg error';
          msg.textContent = 'Those passwords don\'t match.';
          msg.style.display = 'block';
          return;
        }
        if (pw.length < 12 || !/\d/.test(pw)) {
          msg.className = 'msg error';
          msg.textContent = 'Use at least 12 characters and include 1 number.';
          msg.style.display = 'block';
          return;
        }
        msg.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Creating…';

        var ref = (new URLSearchParams(window.location.search).get('ref') || document.getElementById('referral_code').value || '').trim();
        var nextInput = document.getElementById('next_url');
        var nextVal = (nextInput && nextInput.value) ? nextInput.value.trim() : '';
        var mo = document.getElementById('marketing_opt_in');
        var payload = {
          email: email,
          email_confirm: email2,
          password: pw,
          referral_code: ref || undefined,
          marketing_opt_in: !!(mo && mo.checked)
        };
        if (nextVal && nextVal !== '/account') payload.next = nextVal;
        fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            msg.className = 'msg success';
            msg.textContent = data.message || 'Check your email to verify your address — then you can log in.';
            msg.style.display = 'block';
            var continueEl = document.getElementById('msg-continue');
            if (continueEl && nextVal && nextVal.indexOf('captions-checkout') !== -1) {
              var loginNext = encodeURIComponent(nextVal);
              continueEl.innerHTML = 'When you\'ve verified, <a href="/login?next=' + loginNext + '" style="color:inherit;font-weight:600;">log in to complete your upgrade</a>.';
              continueEl.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = 'Create account';
          } else {
            msg.className = 'msg error';
            msg.textContent = data.error || 'Something didn\'t go through — try again.';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create account';
          }
        })
        .catch(function() {
          msg.className = 'msg error';
          msg.textContent = 'Something didn\'t send — try again.';
          msg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create account';
        });
      });
    })();
  </script>
  {% include '_footer.html' %}
</body>
</html>
