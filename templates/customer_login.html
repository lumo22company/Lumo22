<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | Lumo 22</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
  <meta name="description" content="Log in to your Lumo 22 account. Access your Captions in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Encode+Sans+Condensed:wght@400;500;600;700;800;900&family=PT+Sans+Narrow:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}?v={{ asset_version }}">
  <style>
    .auth-section { min-height: 70vh; display: flex; align-items: center; padding-top: 5rem; }
    .auth-form-wrap { max-width: 420px; }
    .auth-form-wrap label { display: block; font-family: var(--font-body); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--lum-text-muted); margin-bottom: 0.5rem; }
    .auth-form-wrap input { width: 100%; padding: 14px 18px; background: var(--lum-surface-elevated); border: 1px solid var(--lum-border); border-radius: var(--radius-btn); color: var(--lum-text); font-family: var(--font-body); font-size: 0.95rem; margin-bottom: 1.25rem; transition: border-color var(--duration-fast); }
    .auth-form-wrap input:focus { outline: none; border-color: var(--lum-gold); }
    .auth-form-wrap input::placeholder { color: var(--lum-text-subtle); }
    .auth-form-wrap .auth-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; min-height: 48px; padding: 14px 24px; background: #ffffff; color: #000000; font-family: var(--font-body); font-weight: 500; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border: none; border-radius: var(--radius-btn); cursor: pointer; transition: transform 0.3s ease-in-out, background-color 0.3s ease-in-out; }
    .auth-form-wrap .auth-btn:hover:not(:disabled) { transform: translateY(-3px); background-color: var(--lum-gold); }
    .auth-form-wrap .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-form-wrap .auth-msg { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: var(--radius-btn); font-size: 0.9rem; font-family: var(--font-body); }
    .auth-form-wrap .auth-msg.error { background: rgba(200,80,80,0.15); color: var(--lum-text); }
    .auth-form-wrap .auth-msg.success { background: rgba(76,175,80,0.15); color: var(--lum-text); }
    .auth-links { margin-top: 1.5rem; font-size: 0.9rem; }
    .auth-links p { margin-bottom: 0.75rem; }
    .auth-links a { color: var(--lum-gold); text-decoration: none; transition: color var(--duration-fast); }
    .auth-links a:hover { color: var(--lum-ivory); }
    .auth-links .auth-muted { color: var(--lum-text-muted); }
    .auth-links .auth-muted a { color: var(--lum-text-muted); }
    .auth-links .auth-muted a:hover { color: var(--lum-text); }
  </style>
</head>
<body class="lumo-landing">
  <nav class="lumo-nav lumo-nav-scrolled" id="lumo-nav">
    <div class="lumo-nav-left">
      <a href="/" class="lumo-nav-logo">Lumo 22</a>
      <a href="/captions" class="lumo-nav-link">Captions</a>
    </div>
    <a href="/signup" class="lumo-nav-cta lumo-nav-signup">Sign up</a>
  </nav>

  <main id="main-content">
  <section class="block block-trust section-dark auth-section">
    <div class="section-inner">
      <div class="block-inner auth-form-wrap">
        <p class="block-label">Your account</p>
        <h1 class="block-title">Log in</h1>
        <p class="block-desc">Access your Captions in one place.</p>

        <form id="login-form" action="/login" method="post">
          <input type="hidden" name="next" value="{{ next_url|default(request.args.get('next', '/account')) }}">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" value="{{ request.form.get('email', '') }}">

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">

          <button type="submit" class="auth-btn auth-btn-swipe" id="btn">Log in</button>
          {% if login_error %}
          <div class="auth-msg error" style="display: block;">{{ login_error }}</div>
          {% else %}
          <div id="msg" class="auth-msg" style="display: none;"></div>
          {% endif %}
        </form>

        <div class="auth-links">
          {% if needs_verification %}
          <p><button type="button" id="resend-verify-btn" style="background:none;border:none;padding:0;color:var(--lum-gold);cursor:pointer;font-size:0.9rem;font-family:inherit;">Resend verification email</button></p>
          {% endif %}
          <p><a href="/forgot-password">Forgot password?</a></p>
          <p class="auth-muted">Don't have an account? <a href="/signup">Sign up</a></p>
          <p class="auth-muted"><a href="/">← Back to Lumo 22</a></p>
        </div>
      </div>
    </div>
  </section>
  </main>

  {% include '_footer.html' %}

  <script>
    (function() {
      var btn = document.getElementById('btn');
      var form = document.getElementById('login-form');
      if (form && btn) {
        form.addEventListener('submit', function() {
          btn.disabled = true;
          btn.textContent = 'Logging in…';
        });
      }
      var resendBtn = document.getElementById('resend-verify-btn');
      var emailInput = document.getElementById('email');
      if (resendBtn && emailInput) {
        resendBtn.addEventListener('click', function() {
          resendBtn.disabled = true;
          resendBtn.textContent = 'Sending…';
          fetch('/api/auth/resend-verification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailInput.value.trim() })
          })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.ok) {
              resendBtn.textContent = data.message || 'Verification email sent. Check your inbox.';
            } else {
              resendBtn.textContent = data.error || 'Failed. Try again.';
              resendBtn.disabled = false;
            }
          })
          .catch(function() {
            resendBtn.textContent = 'Failed. Try again.';
            resendBtn.disabled = false;
          });
        });
      }
    })();
  </script>
</body>
</html>
